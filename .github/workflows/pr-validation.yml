name: PR Validation

on:
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - labeled
      - unlabeled

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  check-issue-reference:
    name: Check Issue Reference
    runs-on: ubuntu-latest
    steps:
      - name: Validate linked issue in PR body
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const match = body.match(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/i);

            if (!match) {
              core.setFailed("PR body must include Closes #N, Fixes #N, or Resolves #N.");
              return;
            }

            core.info(`Linked issue detected: #${match[1]}`);

  check-issue-approved:
    name: Check Issue Has status:approved
    runs-on: ubuntu-latest
    steps:
      - name: Validate approved issue label
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const match = body.match(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/i);

            if (!match) {
              core.setFailed("Cannot validate issue approval because no linked issue was found in the PR body.");
              return;
            }

            const issue_number = Number(match[1]);
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            });

            const labels = issue.labels.map(label => typeof label === 'string' ? label : label.name);

            if (!labels.includes('status:approved')) {
              core.setFailed(`Linked issue #${issue_number} must have the label status:approved.`);
              return;
            }

            core.info(`Issue #${issue_number} has status:approved.`);

  check-pr-type-label:
    name: Check PR Has type:* Label
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR type label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(label => label.name);
            const typeLabels = labels.filter(name => name.startsWith('type:'));

            if (typeLabels.length !== 1) {
              core.setFailed(`PR must have exactly one type:* label. Found: ${typeLabels.length}.`);
              return;
            }

            core.info(`PR type label detected: ${typeLabels[0]}`);

  check-conventional-commits:
    name: Validate Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - name: Get PR commits
        uses: actions/github-script@v7
        with:
          script: |
            const { data: commits } = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 50,
            });

            const conventionalPattern = /^(feat|fix|docs|style|refactor|perf|test|ci|build|chore|revert)(\([^)]+\))?!?: .{1,}/;
            const invalidCommits = [];

            for (const commit of commits) {
              const message = commit.commit.message.split('\n')[0];
              if (!conventionalPattern.test(message)) {
                invalidCommits.push(message);
              }
            }

            if (invalidCommits.length > 0) {
              core.setFailed(
                `The following commits do not follow Conventional Commits format:\n` +
                invalidCommits.map(c => `- ${c}`).join('\n') +
                `\n\nRequired format: <type>(<scope>)?: <description>\n` +
                `Types: feat, fix, docs, style, refactor, perf, test, ci, build, chore, revert`
              );
              return;
            }

            core.info(`All ${commits.length} commit(s) follow Conventional Commits format.`);
