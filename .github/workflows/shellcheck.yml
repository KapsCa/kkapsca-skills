name: ShellCheck

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - feat/**
      - fix/**
      - chore/**
      - docs/**
      - refactor/**
      - ci/**

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Collect shell scripts
        id: scripts
        run: |
          mapfile -t scripts < <(git ls-files '*.sh')

          if [ "${#scripts[@]}" -eq 0 ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s\n' "${scripts[@]}" > shellcheck-files.txt
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: Run ShellCheck
        if: steps.scripts.outputs.found == 'true'
        run: xargs -r shellcheck < shellcheck-files.txt

      - name: No shell scripts found
        if: steps.scripts.outputs.found != 'true'
        run: echo "No shell scripts found to validate."
